name: Test

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua and LuaRocks
        run: sudo apt-get install -y lua5.4 luarocks

      - name: Install luacheck
        run: sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck DingTimer tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lua-version: ['5.1', '5.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua
        run: sudo apt-get install -y lua${{ matrix.lua-version }}

      - name: Run tests
        run: |
          for f in tests/test_*.lua; do
            echo "→ $f (Lua ${{ matrix.lua-version }})"
            lua${{ matrix.lua-version }} "$f" || exit 1
          done
